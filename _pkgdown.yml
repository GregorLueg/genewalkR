url: https://gregorlueg.github.io/genewalkR/

template:
  bootstrap: 5
  bootswatch: darkly
  bslib:
    primary: "#00bc8c"
    border-radius: 0.4rem
    btn-border-radius: 0.4rem
  includes:
    in_header: ""
  css: pkgdown/extra.css

home:
  title: "genewalkR"
  description: "node2vec-based analyses over biological networks in R powered by Rust."

navbar:
  structure:
    left: [intro, reference, articles]
    right: [search, github]
  components:
    github:
      icon: fab fa-github
      href: https://github.com/GregorLueg/genewalkR
      aria-label: GitHub

articles:
  - title: "Vignettes"
    navbar: ~
    contents:
      - node2vec
      - genewalk
      - embedding_drift

reference:
  - title: "Node2Vec"
    desc: "Run Node2Vec"
    contents:
      - node2vec
  - title: "GeneWalk workflow"
    desc: "Main classes and methods to run GeneWalk"
    contents:
      - GeneWalk
      - GeneWalkGenerator
      - check_degree_distribution
      - generate_initial_emb
      - generate_permuted_emb
      - calculate_genewalk_stats
      - plot_gw_results
      - plot_similarities
  - title: "Gene / Embedding drift"
    desc: "Main classes and methods to run a gene/embedding drift"
    contents:
      - EmbedDrift
      - generate_initial_embeddings
      - calculate_drift
  - title: "Helpers and getters"
    desc: "Various getters and helper classes"
    contents:
      - get_stats
      - get_graph_dt
      - get_graph_dts
      - get_gw_data
      - get_gw_data_filtered
      - get_gene_pathway_dt
      - get_embedding
      - get_embeddings
      - get_aligned_embd
      - get_gene_info
      - n_nodes
      - new_data_builder
  - title: "Data sources"
    desc: "How to download and interact with the internal DB."
    contents:
      - reload_db
      - download_database
      - get_db_connection
      - get_interactions_combined
      - get_interactions_intact
      - get_interactions_reactome
      - get_interactions_signor
      - get_interactions_string
      - get_interactions_pc
      - get_gene_ontology_info
      - get_gene_ontology_hierarchy
      - get_reactome_info
      - get_reactome_hierarchy
      - get_gene_to_go
      - get_gene_to_reactome
  - title: "(Synthetic) Data & testing"
    contents:
      - differential_graph_test_data
      - synthetic_genewalk_data
      - node2vec_test_data
      - evaluate_node2vec_test
      - myc_genes
  - title: "Params"
    desc: "Wrapper functions around core parameters"
    contents:
      - params_genewalk
      - params_node2vec
      - params_genewalk_data
  - title: "Rust wrappers"
    desc: "Everything rusty - only use this if you know what you are doing..."
    contents:
      - rs_node2vec
      - rs_cosine_sim
      - rs_gene_walk
      - rs_gene_walk_perm
      - rs_gene_walk_test
      - rs_procrustes_align
      - rs_build_synthetic_genewalk
      - rs_node2vec_synthetic_data
      - rs_differential_graph_data
